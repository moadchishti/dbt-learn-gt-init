version: 2

models:
  - name: dim_customers
    description: Customer dimension combining customer attributes with order history metrics at one row per customer.
    columns:
      - name: customer_id
        data_type: number
        description: Primary key for the customer dimension.
        data_tests:
          - not_null
          - unique

      - name: first_name
        data_type: varchar
        description: Customer first name from the staging customer model.

      - name: last_name
        data_type: varchar
        description: Customer last name from the staging customer model.

      - name: first_order_date
        data_type: date
        description: Date of the customer's first recorded order.

      - name: most_recent_order_date
        data_type: date
        description: Date of the customer's most recent recorded order.

      - name: number_of_orders
        data_type: number
        description: Count of orders associated with the customer across all recorded history.
